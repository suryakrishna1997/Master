        - Updates the low-level firmware of deeply embedded ECUs (e.g., Engine Control, Brake Control).
        - Highly critical. A failed FOTA update can "brick" the ECU, rendering the car undrivable.

        ### SOTA (Software Over-The-Air)
        - Updates higher-level application software, usually in the Infotainment or Telematics domain (e.g., updating the Navigation Maps or adding a new Spotify app).
        - Less critical than FOTA.

        ---

        ## 2. The OTA Update Process

        A standard OTA process involves a cloud backend and an in-vehicle OTA Client (usually running on the Telematics Unit or Central Gateway).

        ### Message Flow
        \`\`\`mermaid
        sequenceDiagram
            participant Cloud as OEM Cloud Server
            participant TCU as Telematics Unit (OTA Master)
            participant ECU as Target ECU

            Cloud->>TCU: Update Available Notification
            TCU-->>Cloud: Accept & Download
            Note over TCU: Download encrypted package over 4G/5G
            TCU->>TCU: Decrypt & Verify Signature
            TCU->>Driver: Prompts Driver "Install Now? Takes 30 mins."
            Driver->>TCU: Clicks "Yes"
            Note over TCU,ECU: Vehicle put into Safe State (Engine Off)
            TCU->>ECU: UDS 0x10 0x02 (Programming Session)
            TCU->>ECU: UDS 0x34 / 0x36 / 0x37 (Transfer Data)
            ECU-->>TCU: Flash Complete
            TCU->>Cloud: Update Successful
        \`\`\`

        ---

        ## 3. Rollback Mechanisms (A/B Partitioning)

        The biggest risk in OTA is an update failing halfway through (e.g., car battery dies), leaving the ECU corrupted. **A/B Partitioning (Dual Bank Memory)** solves this.

        ### Working Principle
        - The ECU flash memory is divided into two identical banks: Bank A and Bank B.
        - Currently, the ECU is running from Bank A.
        - During the OTA update, the new software is downloaded and written to Bank B in the background while the car is driving.
        - Once the write to Bank B is verified (Checksum/Signature check), a boot flag is flipped.
        - The next time the car restarts, it boots from Bank B.
        - **Rollback:** If Bank B crashes upon boot, the bootloader automatically flips the flag back and reboots into the safe, older software on Bank A.

        ---

        ## 4. OTA Validation

        Testing OTA requires simulating the entire cloud-to-car pipeline.

        ### Test Scenarios
        1. **Power Interruption:** Start an OTA update. Cut power to the ECU at 50%. Restore power. *Expected Result:* The system should either resume the download or trigger an A/B rollback to the previous version. The car must remain drivable.
        2. **Corrupted Payload:** Inject a single flipped bit into the OTA payload. *Expected Result:* The signature verification must fail, and the update is rejected before flashing begins.
        3. **Safe State Check:** Attempt to start an update while the vehicle is driving at 100 km/h. *Expected Result:* Update rejected. System prompts driver to Park and apply the parking brake.

        ---

        ## Interview Questions & Answers

        **Q: What is A/B partitioning and why is it essential for FOTA?**
        > A: A/B partitioning divides ECU flash memory into two banks. It allows new firmware to be flashed to the inactive bank in the background. Its primary benefit is providing a seamless, instant switch to the new software upon reboot, and providing a fail-safe rollback mechanism to the old software if the new software fails to boot. This prevents "bricking" the ECU.

        **Q: What is the difference between FOTA and SOTA?**
        > A: FOTA updates the core firmware of microcontrollers (like engine or braking ECUs) and requires strict safety protocols (like vehicle parked, engine off). SOTA updates application-level software (like infotainment apps or maps) and can often occur transparently in the background.

        ---

        ## Chapter Summary
        - **OTA Updates** eliminate the need for physical dealership visits for software patches.
        - The process heavily utilizes **UDS over DoIP/CAN** for the final flashing step.
        - **A/B Partitioning** is the industry standard for ensuring safe, brick-proof updates via automatic rollback mechanisms.`,

            "15_Tools.md": `# SECTION 15: Tools Used in the Automotive Industry

        Automotive engineers rely on specialized hardware and software tools to design, simulate, and test complex vehicular networks.

        ---

        ## 1. Network Simulation & Analysis Tools

        ### Vector CANoe
        The industry standard for development, testing, and analysis of entire ECU networks (CAN, LIN, Ethernet, FlexRay).
        - **Core Feature:** "Restbus Simulation." If you are developing a radio ECU, CANoe can simulate the Engine, Brakes, and Body controllers so the radio thinks it's in a real car.
        - **CAPL (CAN Access Programming Language):** A C-like scripting language used within CANoe to write automated test scripts and simulation logic.

        ### Vector CANalyzer
        The "lite" version of CANoe. Used primarily for analyzing and logging data traffic on the bus. It cannot do full network simulation.

        ### Intrepid Vehicle Spy
        A strong competitor to CANoe. Often preferred for its lower cost and ease of use in specific diagnostic and data logging scenarios.

        ---

        ## 2. Measurement & Calibration Tools

        ### ETAS INCA
        Used heavily in Powertrain engineering. It allows engineers to read and modify the internal memory of an ECU in real-time while the engine is running to tune performance (Calibration) using protocols like XCP/CCP.

        ### dSPACE ControlDesk
        Used for managing Hardware-in-the-Loop (HIL) simulations. Provides graphical dashboards to control the HIL simulator and monitor virtual sensor/actuator data.

        ---

        ## 3. Model-Based Design

        ### MATLAB & Simulink
        Instead of writing C code by hand, engineers design control logic (like ABS algorithms) using block diagrams in Simulink. The tool then automatically generates MISRA-compliant C code from the model.

        ---

        ## 4. Software Development & DevOps

        ### Git & SVN
        Version control systems for source code.
        - **Git:** Distributed (every developer has a full copy of the repository).
        - **SVN:** Centralized (heavily used in legacy automotive projects for binary files).

        ### Jenkins
        A Continuous Integration/Continuous Deployment (CI/CD) server. Every time a developer pushes code to Git, Jenkins automatically compiles it, runs unit tests, and generates a report.

        ### Jira & Confluence (Atlassian)
        - **Jira:** Issue and bug tracking, Agile sprint management.
        - **Confluence:** Engineering wiki and documentation.

        ---

        ## 5. Diagnostic & IT Tools

        ### Wireshark
        An open-source network protocol analyzer. Indispensable for debugging Automotive Ethernet (SOME/IP, DoIP) traffic.

        ### DTS Monaco
        A comprehensive engineering diagnostic tool. Used to execute UDS diagnostic services, read DTCs, and perform flash programming during the development phase.

        ---

        ## Interview Questions & Answers

        **Q: What is Restbus Simulation and which tool is primarily used for it?**
        > A: Restbus Simulation is the process of simulating the missing parts of a vehicle network. If you only have one physical ECU on a test bench, a tool like Vector CANoe simulates the rest of the bus (the "Restbus") so the physical ECU receives the messages it expects and functions normally.

        **Q: How does Model-Based Design (MBD) differ from traditional coding?**
        > A: In traditional coding, an engineer writes C/C++ code manually based on requirements. In MBD (using MATLAB/Simulink), the engineer creates a visual, mathematical model of the system. The behavior can be simulated and verified visually. Once verified, a tool automatically generates the C code, drastically reducing human syntax errors.

        ---

        ## Chapter Summary
        - **Vector CANoe/CANalyzer** dominate network simulation and analysis.
        - **MATLAB/Simulink** are standard for Model-Based Design and auto-code generation.
        - **ETAS INCA** is used for real-time engine calibration.
        - **Jenkins and Git** form the backbone of modern automotive DevOps pipelines.`,

            "16_Interview_Prep.md": `# SECTION 16: Automotive Interview Preparation

        This section compiles the most frequently asked, scenario-based, and technical questions encountered in automotive engineering interviews.

        ---

        ## 1. CAN Protocol Questions

        **Q: What is the dominant and recessive state in CAN?**
        > A: Dominant is logical 0, where the voltage difference between CAN High and CAN Low is roughly 2V. Recessive is logical 1, where both lines rest at 2.5V (difference is 0V). A dominant bit always overwrites a recessive bit on the bus.

        **Q: How does CAN Arbitration work?**
        > A: When two nodes transmit simultaneously, they read the bus back. If a node transmits a recessive bit (1) but reads a dominant bit (0), it knows a higher-priority message is transmitting. It immediately stops transmitting and becomes a receiver. Lower ID = Higher Priority.

        **Q: What is Bit Stuffing?**
        > A: If 5 consecutive bits of the same polarity are transmitted, the controller automatically inserts a bit of the opposite polarity. This ensures the receiver maintains synchronization.

        ## 2. UDS & Diagnostics Questions

        **Q: Differentiate between UDS Service 0x10 and 0x11.**
        > A: 0x10 is Diagnostic Session Control (changing the ECU state to Programming or Extended session). 0x11 is ECU Reset (commanding the ECU to physically reboot).

        **Q: Explain the Flashing Sequence (OTA/OBD).**
        > A: 1. Enter Extended Session (10 03). 2. Unlock Security via Seed/Key (27 01/02). 3. Enter Programming Session (10 02). 4. Request Download (34). 5. Transfer Data blocks (36). 6. Request Transfer Exit (37). 7. Hard Reset (11 01).

        **Q: What happens if you get an NRC 0x22 during flashing?**
        > A: NRC 0x22 means "Conditions Not Correct." It likely means the vehicle is not in a safe state to flash (e.g., the engine is running, or the vehicle is moving).

        ## 3. ADAS Questions

        **Q: Compare Radar and LiDAR.**
        > A: Radar uses radio waves; it is cheap, works perfectly in fog/rain, and excels at measuring relative speed (Doppler effect) but has poor resolution. LiDAR uses light (lasers); it generates a highly precise 3D map of the environment but is expensive and performs poorly in heavy rain or snow.

        **Q: What is Sensor Fusion?**
        > A: Combining inputs from multiple sensors (Camera + Radar) to create a single, highly confident environmental model. It mitigates the weaknesses of individual sensors.

        ## 4. AUTOSAR Questions

        **Q: Explain the difference between BSW, RTE, and SWC.**
        > A: SWC (Software Component) contains the application logic. BSW (Basic Software) contains the OS, network drivers, and hardware abstractions. RTE (Runtime Environment) is the middleware that routes communication between SWCs and the BSW, ensuring the SWC is hardware-independent.

        **Q: What is an ARXML file?**
        > A: AUTOSAR XML. It is the configuration file format used to define everything in an AUTOSAR project, from the interfaces of an SWC to the baud rate of the CAN bus.

        ## 5. Testing & Agile Questions

        **Q: How do you design test cases for an Adaptive Cruise Control system?**
        > A: Use Boundary Value Analysis. Test at the minimum activation speed (e.g., 30 km/h), the maximum (150 km/h), and just outside those bounds (29 km/h, 151 km/h). Test positive cases (car ahead slows down) and negative cases (radar sensor gets covered in mud).

        **Q: What is a Traceability Matrix?**
        > A: A document/tool feature that maps every requirement to its corresponding design element, code commit, and test case. It proves that every requirement has been implemented and tested, which is mandatory for ISO 26262 compliance.

        ## 6. Scenario-Based & Debugging Scenarios

        **Scenario 1: ECU is not transmitting on the CAN bus.**
        > **Debugging Steps:**
        > 1. Check physical layer: Use a multimeter to verify 12V power and Ground.
        > 2. Check CAN termination: Verify 60 ohms across CAN High and CAN Low.
        > 3. Check Wakeup: Scope the CAN lines or KL15 (Ignition) to ensure the ECU is receiving a wakeup pulse.
        > 4. Check Software: Ensure the ECU isn't in "Bus Off" state due to excessive error frames.

        **Scenario 2: The Infotainment system crashes when connecting a specific Bluetooth phone.**
        > **Debugging Steps:**
        > 1. Replicate the issue with logging enabled (e.g., capture an HCI snoop log from the phone and a dlt-log from the head unit).
        > 2. Analyze the PBAP (Phonebook) sync. Is the phone sending a contact with a corrupted character or an extremely large profile picture that is causing a buffer overflow in the head unit?
        > 3. Verify the Bluetooth stack versions.

        ---

        *Tip: For interviews, always structure your answers using the STAR method (Situation, Task, Action, Result) when asked about past project experience.*`,

            "17_Real_Time_Projects.md": `# SECTION 17: Real-Time Projects

        This section outlines end-to-end practical projects that engineers can build or simulate to gain hands-on experience in automotive testing and validation.

        ---

        ## Project 1: CAN Network Validation

        **Objective:** Validate the communication between a simulated Engine Control Unit and a Dashboard Display.
        **Tools Required:** Vector CANoe, CAN hardware interface (VN1610).
        **Execution:**
        1. Create a DBC file defining two nodes (Engine, Dashboard).
        2. Define a message \`EngineData\` (ID 0x100) containing \`RPM\` (0-8000) and \`Temperature\` (0-150C).
        3. Write a CAPL script in CANoe to simulate the Engine node ramping up RPM from 0 to 4000.
        4. Create an Interactive Generator (IG) block to inject error frames and observe the Dashboard's reaction.
        5. **Validation:** Ensure the Dashboard node correctly displays the RPM and logs an error if the \`EngineData\` message times out (Cycle time > 100ms).

        ---

        ## Project 2: UDS Diagnostics Validation

        **Objective:** Implement and test a UDS Security Access (0x27) and Flash Erase (0x31) routine.
        **Tools Required:** CANoe Diagnostics Feature Set or CANalyzer.
        **Execution:**
        1. Setup a simulated ECU in CANoe.
        2. Send \`10 03\` to enter Extended Session. Verify positive response \`50 03\`.
        3. Send \`27 01\` to request a seed.
        4. Write a CAPL test module that calculates the correct Key and sends \`27 02 <Key>\`.
        5. Send a Routine Control request \`31 01 FF 00\` (Erase Memory).
        6. **Validation:** Create a negative test case by sending the wrong Key and verifying the ECU responds with NRC 0x35 (Invalid Key).

        ---

        ## Project 3: Infotainment Bluetooth Testing

        **Objective:** Validate A2DP streaming and AVRCP controls.
        **Tools Required:** Android/iOS smartphone, Automotive Head Unit (or emulator), Bluetooth Sniffer (Ellisys).
        **Execution:**
        1. Pair the smartphone to the Head Unit.
        2. Start streaming music via Spotify (A2DP).
        3. Press the physical "Next Track" button on the steering wheel (AVRCP).
        4. **Validation:** Capture the Bluetooth air traffic. Verify that the AVRCP 'Next' command was sent from the Head Unit, acknowledged by the phone, and that the A2DP stream updated to the new song within 500ms.

        ---

        ## Project 4: ADAS Autonomous Emergency Braking (AEB) Validation

        **Objective:** Test AEB logic in a virtual environment.
        **Tools Required:** IPG CarMaker or Carla Simulator.
        **Execution:**
        1. Create a test track in the simulator.
        2. Script a target vehicle (Ego car) driving at 60 km/h.
        3. Script a dummy vehicle 50 meters ahead that suddenly brakes at 1g deceleration.
        4. **Validation:** Monitor the Ego car's simulated Radar data. Ensure the AEB algorithm triggers a warning at Time-To-Collision (TTC) = 2.5s, and applies full autonomous braking at TTC = 1.0s, preventing a collision.

        ---

        ## Project 5: OTA Update Validation

        **Objective:** Validate the A/B partition rollback mechanism.
        **Tools Required:** Raspberry Pi (simulating a TCU), OTA Server script (Python).
        **Execution:**
        1. Partition the Raspberry Pi SD card into Boot, Bank A, and Bank B.
        2. Run a simple "Version 1" script on Bank A.
        3. Push an OTA update ("Version 2") from the Python server to the Pi over Wi-Fi.
        4. The Pi writes Version 2 to Bank B and reboots.
        5. **Validation 1 (Positive):** Pi boots from Bank B and reports Version 2.
        6. **Validation 2 (Negative):** Push a corrupted "Version 3". The Pi attempts to boot, fails the checksum, and automatically reboots back into Bank B (Version 2).

        ---

        ## Project 6: Automotive Ethernet & SOME/IP

        **Objective:** Validate service discovery over Ethernet.
        **Tools Required:** Wireshark, Python (Scapy).
        **Execution:**
        1. Write a Python script to simulate a Camera ECU publishing a video stream availability using SOME/IP-SD.
        2. Write a second script (Display ECU) that subscribes to this service.
        3. **Validation:** Run Wireshark. Filter by \`someip\`. Verify the Subscribe Request and Subscribe ACK packets are correctly formatted and acknowledged.`,

            "18_Reference_Standards.md": `# SECTION 18: Industry Reference Standards

        A quick-reference guide to the most critical standards governing automotive software and hardware engineering.

        ---

        ## 1. ISO (International Organization for Standardization)

        - **ISO 11898 (Road vehicles — Controller area network):**
          - The foundational standard for the CAN bus. Specifies the data link layer and physical signaling.

        - **ISO 14229 (Unified Diagnostic Services - UDS):**
          - Standardizes the diagnostic services (SIDs) and responses used across all ECUs in modern vehicles regardless of the underlying physical bus.

        - **ISO 15765 (Diagnostics on CAN - DoCAN):**
          - Defines the transport protocol (ISO-TP) required to send diagnostic messages larger than 8 bytes over a standard CAN bus.

        - **ISO 26262 (Road vehicles — Functional safety):**
          - The bible of automotive safety. Defines ASIL (Automotive Safety Integrity Levels) and mandates rigorous engineering processes to prevent unreasonable risk due to hazards caused by malfunctioning behavior of E/E systems.

        - **ISO 21434 (Road vehicles — Cybersecurity engineering):**
          - Standardizes the engineering requirements for cybersecurity risk management. Mandates TARA (Threat Analysis and Risk Assessment).

        - **ISO 13400 (Diagnostics over Internet Protocol - DoIP):**
          - Facilitates diagnostic communication over vehicle Ethernet, crucial for high-speed OTA updates.

        ---

        ## 2. SAE (Society of Automotive Engineers)

        - **SAE J1939:**
          - The standard communication protocol for heavy-duty commercial vehicles, defining the use of 29-bit CAN IDs, PGNs, and SPNs.

        - **SAE J3016 (Levels of Driving Automation):**
          - The globally recognized standard defining the 6 levels of autonomous driving (from Level 0: No Automation to Level 5: Full Automation).

        - **SAE J1962 (OBD-II Connector):**
          - Defines the physical 16-pin OBD-II diagnostic connector found under the dashboard of all passenger vehicles.

        ---

        ## 3. Consortia and Process Standards

        - **AUTOSAR (Automotive Open System Architecture):**
          - A global development partnership standardizing the software architecture for automotive ECUs to allow hardware-independence and software component reuse.

        - **ASPICE (Automotive Software Process Improvement and Capability dEtermination):**
          - A framework used to evaluate and improve the software development processes of automotive suppliers. It heavily emphasizes traceability from requirements down to testing.

        ---

        *End of Handbook.*`
        };

        // ============================================================
        // APP LOGIC
        // ============================================================
        const chapters = [
            { title: "Introduction", file: "README.md" },
            { title: "1. Industry Fundamentals", file: "01_Industry_Fundamentals.md" },
            { title: "2. Communication Protocols", file: "02_Communication_Protocols.md" },
            { title: "3. Diagnostics", file: "03_Diagnostics.md" },
            { title: "4. Heavy Duty Protocols", file: "04_Heavy_Duty_Protocols.md" },
            { title: "5. SDLC & Standards", file: "05_SDLC_and_Standards.md" },
            { title: "6. Automotive Testing", file: "06_Automotive_Testing.md" },
            { title: "7. AUTOSAR", file: "07_AUTOSAR.md" },
            { title: "8. ADAS", file: "08_ADAS.md" },
            { title: "9. Infotainment", file: "09_Infotainment.md" },
            { title: "10. Connectivity", file: "10_Connectivity.md" },
            { title: "11. Navigation", file: "11_Navigation.md" },
            { title: "12. Radio Technologies", file: "12_Radio_Technologies.md" },
            { title: "13. Cybersecurity", file: "13_Cybersecurity.md" },
            { title: "14. OTA Updates", file: "14_OTA_Updates.md" },
            { title: "15. Tools Used", file: "15_Tools.md" },
            { title: "16. Interview Prep", file: "16_Interview_Prep.md" },
            { title: "17. Real-Time Projects", file: "17_Real_Time_Projects.md" },
            { title: "18. Reference Standards", file: "18_Reference_Standards.md" }
        ];

        let currentIndex = -1;

        const tocList = document.getElementById('toc-list');
        const contentArea = document.getElementById('markdown-content');
        const spinner = document.getElementById('loading-spinner');
        const pagination = document.getElementById('pagination');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // Configure marked.js
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang === 'mermaid') {
                    return `<div class="mermaid">${code}</div>`;
                }
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-',
        });

        mermaid.initialize({
            startOnLoad: false,
            theme: document.body.classList.contains('dark-mode') ? 'dark' : 'default',
            securityLevel: 'loose'
        });

        // Build Sidebar
        function buildSidebar() {
            chapters.forEach((chapter, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${chapter.file}`;
                a.textContent = chapter.title;
                a.dataset.index = index;

                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadChapter(index);
                    document.getElementById('sidebar').classList.remove('open');
                });

                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // Load Chapter from embedded content
        async function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;

            currentIndex = index;
            const chapter = chapters[index];

            // Update active state
            document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar-nav a[data-index="${index}"]`);
            if (activeLink) activeLink.classList.add('active');

            history.pushState(null, null, `#${chapter.file}`);

            contentArea.style.opacity = 0;
            setTimeout(() => {
                spinner.style.display = 'flex';
                contentArea.innerHTML = '';
            }, 200);

            try {
                const markdown = chapterContent[chapter.file];
                if (!markdown) throw new Error('Content not found for ' + chapter.file);

                const html = marked.parse(markdown);

                setTimeout(() => {
                    spinner.style.display = 'none';
                    contentArea.innerHTML = html;

                    // Render mermaid diagrams
                    mermaid.init(undefined, document.querySelectorAll('.mermaid'));

                    contentArea.style.opacity = 1;
                    updatePagination();
                    document.querySelector('.main-content').scrollTop = 0;
                }, 300);

            } catch (error) {
                spinner.style.display = 'none';
                contentArea.innerHTML = `
                    <div class="markdown-body">
                        <h1>Error Loading Chapter</h1>
                        <p>Could not load <code>${chapter.file}</code>.</p>
                        <p>Please check that the content is embedded correctly.</p>
                    </div>
                `;
                contentArea.style.opacity = 1;
            }
        }

        function updatePagination() {
            pagination.style.display = 'flex';

            if (currentIndex > 0) {
                prevBtn.style.visibility = 'visible';
                prevBtn.textContent = `← ${chapters[currentIndex - 1].title}`;
            } else {
                prevBtn.style.visibility = 'hidden';
            }

            if (currentIndex < chapters.length - 1) {
                nextBtn.style.visibility = 'visible';
                nextBtn.textContent = `${chapters[currentIndex + 1].title} →`;
            } else {
                nextBtn.style.visibility = 'hidden';
            }
        }

        prevBtn.addEventListener('click', () => loadChapter(currentIndex - 1));
        nextBtn.addEventListener('click', () => loadChapter(currentIndex + 1));

        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');
        const themeText = document.getElementById('theme-text');

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode', !isDark);

            if (isDark) {
                iconMoon.style.display = 'none';
                iconSun.style.display = 'block';
                themeText.textContent = 'Light Mode';
                document.getElementById('theme-style').href =
                    'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css';
                mermaid.initialize({ theme: 'dark' });
            } else {
                iconMoon.style.display = 'block';
                iconSun.style.display = 'none';
                themeText.textContent = 'Dark Mode';
                document.getElementById('theme-style').href =
                    'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css';
                mermaid.initialize({ theme: 'default' });
            }

            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            if (currentIndex >= 0) {
                loadChapter(currentIndex);
            }
        }

        themeBtn.addEventListener('click', toggleTheme);

        // Init
        function init() {
            buildSidebar();

            if (localStorage.getItem('theme') === 'dark') {
                toggleTheme();
            }

            const hash = window.location.hash.substring(1);
            if (hash) {
                const index = chapters.findIndex(c => c.file === hash);
                if (index !== -1) {
                    loadChapter(index);
                    return;
                }
            }

            loadChapter(0);
        }

        init();
    </script>

</body>

</html>
