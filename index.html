<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoKB — Master Knowledge Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg0: #070b13;
      --bg1: #0d1424;
      --bg2: #111827;
      --border: rgba(255, 255, 255, 0.07);
      --border-active: rgba(245, 158, 11, 0.6);
      --text1: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #f59e0b;
      --accent2: #06b6d4;
      --accent-glow: rgba(245, 158, 11, 0.18);
      --sidebar: 260px;
      --topbar: 58px;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] {
      --bg0: #f0f4f8;
      --bg1: #ffffff;
      --bg2: #f8fafc;
      --border: rgba(0, 0, 0, 0.08);
      --border-active: rgba(180, 83, 9, 0.5);
      --text1: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --accent: #b45309;
      --accent2: #0891b2;
      --accent-glow: rgba(180, 83, 9, 0.10);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg0);
      color: var(--text1)
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh
    }

    /* TOPBAR */
    #topbar {
      height: var(--topbar);
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3)
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
      white-space: nowrap;
      flex-shrink: 0
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px var(--accent-glow)
    }

    .logo span {
      color: var(--accent)
    }

    #menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--text1)
    }

    #menu-btn:hover {
      background: var(--accent-glow)
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    #theme-toggle {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text2);
      transition: all .2s
    }

    #theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    /* BODY */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* SIDEBAR */
    #sidebar {
      width: var(--sidebar);
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform .25s ease;
      z-index: 50;
      overflow: hidden
    }

    .sidebar-header {
      padding: 16px 16px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3)
    }

    #module-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent
    }

    .module-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .18s;
      margin-bottom: 3px;
      border: 1px solid transparent
    }

    .module-item:hover {
      background: var(--accent-glow);
      border-color: var(--border)
    }

    .module-item.active {
      background: var(--accent-glow);
      border-color: var(--border-active)
    }

    .module-item.active .module-name {
      color: var(--accent)
    }

    .module-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0
    }

    .module-info {
      flex: 1;
      min-width: 0
    }

    .module-name {
      font-size: 0.87rem;
      font-weight: 600;
      color: var(--text1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .module-sub {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 1px
    }

    .module-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid var(--border-active);
      white-space: nowrap
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text3);
      text-align: center
    }

    /* CONTENT */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg0)
    }

    #content-bar {
      height: 44px;
      flex-shrink: 0;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px
    }

    #breadcrumb {
      font-size: 0.82rem;
      color: var(--text2);
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .crumb-home {
      color: var(--text3)
    }

    .crumb-sep {
      color: var(--text3);
      font-size: 0.7rem
    }

    .crumb-cur {
      color: var(--text1);
      font-weight: 600
    }

    .ctrl-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
      white-space: nowrap;
      font-family: inherit
    }

    .ctrl-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    #iframe-container {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    #iframe-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none
    }

    #iframe-container iframe.visible {
      display: block
    }

    /* WELCOME */
    #welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px;
      background: var(--bg0)
    }

    .welcome-logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: pulse 3s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 30px var(--accent-glow)
      }

      50% {
        box-shadow: 0 0 60px var(--accent-glow), 0 0 20px rgba(245, 158, 11, 0.4)
      }
    }

    .welcome-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      text-align: center
    }

    .welcome-title span {
      color: var(--accent)
    }

    .welcome-sub {
      color: var(--text2);
      font-size: 0.95rem;
      text-align: center;
      max-width: 420px;
      line-height: 1.6
    }

    .welcome-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 640px;
      margin-top: 8px
    }

    .welcome-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px;
      cursor: pointer;
      transition: all .2s;
      text-align: center
    }

    .welcome-card:hover {
      border-color: var(--border-active);
      transform: translateY(-2px);
      box-shadow: var(--shadow)
    }

    .wc-icon {
      font-size: 28px;
      margin-bottom: 8px
    }

    .wc-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text1)
    }

    .wc-sub {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 3px
    }

    /* MOBILE */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 40
    }

    @media(max-width:768px) {
      :root {
        --sidebar: 240px
      }

      #menu-btn {
        display: flex
      }

      #sidebar {
        position: fixed;
        top: var(--topbar);
        left: 0;
        height: calc(100vh - var(--topbar));
        transform: translateX(-100%)
      }

      #sidebar.open {
        transform: translateX(0)
      }

      #sidebar-overlay.open {
        display: block
      }

      .welcome-title {
        font-size: 1.5rem
      }
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px
    }
  </style>
</head>

<body>
  <div id="app">
    <header id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button id="menu-btn" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="logo">
          <div class="logo-icon">🚗</div>Auto<span>KB</span>
        </div>
      </div>
      <div class="topbar-right">
        <button id="theme-toggle"><span id="theme-icon">☀️</span><span id="theme-label">Light</span></button>
      </div>
    </header>
    <div id="body">
      <div id="sidebar-overlay"></div>
      <nav id="sidebar">
        <div class="sidebar-header">Modules</div>
        <div id="module-list"></div>
        <div class="sidebar-footer">AutoKB · v2.0</div>
      </nav>
      <main id="content">
        <div id="content-bar">
          <div id="breadcrumb">
            <span class="crumb-home">AutoKB</span>
            <span class="crumb-sep">›</span>
            <span class="crumb-cur" id="crumb-cur">Home</span>
          </div>
          <button class="ctrl-btn" id="reload-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
            </svg> Reload
          </button>
          <button class="ctrl-btn" id="fullscreen-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15 3 21 3 21 9" />
              <polyline points="9 21 3 21 3 15" />
              <line x1="21" y1="3" x2="14" y2="10" />
              <line x1="3" y1="21" x2="10" y2="14" />
            </svg> Fullscreen
          </button>
        </div>
        <div id="iframe-container">
          <div id="welcome">
            <div class="welcome-logo">🚗</div>
            <div class="welcome-title">Auto<span>KB</span> Master Portal</div>
            <div class="welcome-sub">Your unified knowledge hub for automotive engineering. Pick a module from the
              sidebar or click a card below.</div>
            <div class="welcome-grid" id="welcome-grid"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    //  ▼▼▼  ADD NEW MODULES HERE  ▼▼▼
    //  Just add a new object to this array.
    //  'file' must match the filename in the same repo folder.
    // ═══════════════════════════════════════════════════════════════
    const MODULES = [
      { id: 'autoproto', name: 'AUTO-X Protocols', sub: 'CAN · UDS · Diagnostics', icon: '⚡', badge: 'Protocol', file: 'Automotive_Protocols.html' },
      { id: 'btwifi', name: 'CONN-X Connectivity', sub: 'Bluetooth · Wi-Fi · CarPlay', icon: '📡', badge: 'Connectivity', file: 'Bluetooth_wifi.html' },
      { id: 'linux', name: 'Linux & AOSP', sub: 'WSL · Git · Repo · ADB', icon: '🖥️', badge: 'OS & Build', file: 'Linux_Fundamentals.html' },
      { id: 'Playwright', name: 'Playwright Mastery', sub: 'Playwright', icon: '⚡', badge: 'Framework', file: 'Playwright.html' },
      // { id: 'capl', name: 'CAPL Scripting', sub: 'Macros & Scripts', icon: '🔧', badge: 'Scripting', file: 'capl.html' },
    ];
    // ═══════════════════════════════════════════════════════════════

    const ICON_COLORS = [
      'rgba(245,158,11,0.15)', 'rgba(6,182,212,0.15)',
      'rgba(139,92,246,0.15)', 'rgba(16,185,129,0.15)', 'rgba(239,68,68,0.15)'
    ];
    function iconBg(id) {
      let h = 0; for (const c of id) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return ICON_COLORS[h % ICON_COLORS.length];
    }

    let activeId = null;
    try { activeId = localStorage.getItem('autokb_active') || null; } catch (e) { }

    // ── SIDEBAR ────────────────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('module-list');
      list.innerHTML = '';
      MODULES.forEach(m => {
        const el = document.createElement('div');
        el.className = 'module-item' + (m.id === activeId ? ' active' : '');
        el.innerHTML = `
      <div class="module-icon" style="background:${iconBg(m.id)}">${m.icon}</div>
      <div class="module-info">
        <div class="module-name">${m.name}</div>
        <div class="module-sub">${m.sub || ''}</div>
      </div>
      ${m.badge ? `<span class="module-badge">${m.badge}</span>` : ''}
    `;
        el.addEventListener('click', () => { activate(m.id); closeSidebar(); });
        list.appendChild(el);
      });
    }

    // ── WELCOME CARDS ──────────────────────────────────────────────
    function renderWelcome() {
      const grid = document.getElementById('welcome-grid');
      grid.innerHTML = '';
      MODULES.forEach(m => {
        const card = document.createElement('div');
        card.className = 'welcome-card';
        card.innerHTML = `<div class="wc-icon">${m.icon}</div><div class="wc-name">${m.name}</div><div class="wc-sub">${m.sub || ''}</div>`;
        card.addEventListener('click', () => activate(m.id));
        grid.appendChild(card);
      });
    }

    // ── ACTIVATE ───────────────────────────────────────────────────
    function activate(id) {
      const m = MODULES.find(x => x.id === id);
      if (!m) return;
      activeId = id;
      document.getElementById('welcome').style.display = 'none';
      document.querySelectorAll('#iframe-container iframe').forEach(f => f.classList.remove('visible'));

      let frame = document.getElementById('frame-' + id);
      if (!frame) {
        frame = document.createElement('iframe');
        frame.id = 'frame-' + id;
        frame.title = m.name;
        frame.src = m.file;
        document.getElementById('iframe-container').appendChild(frame);
      }
      frame.classList.add('visible');
      document.getElementById('crumb-cur').textContent = m.name;
      renderSidebar();
      try { localStorage.setItem('autokb_active', id); } catch (e) { }
    }

    // ── THEME ──────────────────────────────────────────────────────
    let isDark = true;
    document.getElementById('theme-toggle').addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
      try { localStorage.setItem('autokb_theme', isDark ? 'dark' : 'light'); } catch (e) { }
    });
    try {
      if (localStorage.getItem('autokb_theme') === 'light') {
        isDark = false; document.documentElement.dataset.theme = 'light';
        document.getElementById('theme-icon').textContent = '🌙';
        document.getElementById('theme-label').textContent = 'Dark';
      }
    } catch (e) { }

    // ── MOBILE ─────────────────────────────────────────────────────
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
    }

    // ── RELOAD / FULLSCREEN ────────────────────────────────────────
    document.getElementById('reload-btn').addEventListener('click', () => {
      if (!activeId) return;
      const f = document.getElementById('frame-' + activeId);
      if (f) { const s = f.src; f.src = ''; f.src = s; }
    });
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      const c = document.getElementById('iframe-container');
      if (!document.fullscreenElement) c.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    // ── INIT ───────────────────────────────────────────────────────
    renderSidebar();
    renderWelcome();
    if (activeId && MODULES.find(m => m.id === activeId)) activate(activeId);
  </script>
</body>

</html>
