<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JS Mastery — Senior Architect Tutor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0d0d0f;
    --surface:   #141418;
    --border:    #242428;
    --accent:    #f7c948;
    --accent2:   #e8873a;
    --text:      #e8e8ec;
    --muted:     #6b6b75;
    --code-bg:   #1a1a1f;
    --green:     #4ade80;
    --red:       #f87171;
    --blue:      #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--muted); }

  .progress-bar-wrap {
    flex: 1;
    margin: 0 24px;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .topic-badge {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Phase pill ── */
  .phase-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 32px 0 12px;
    background: #1f1a09;
    border: 1px solid #3d2e05;
    border-radius: 99px;
    padding: 4px 14px 4px 8px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.06em;
  }
  .phase-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* ── Content card ── */
  .lesson-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    margin-bottom: 20px;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lesson-card h2 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .lesson-card .feature-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    margin-bottom: 20px;
    display: block;
  }

  /* Rendered markdown-like content */
  .content { color: var(--text); }
  .content h3 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 22px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .content h3.problem { color: var(--red); }
  .content h3.mechanic { color: var(--blue); }
  .content h3.usecase { color: var(--green); }
  .content h3.pitfall { color: var(--accent); }

  .content h3::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    border-radius: 2px;
  }
  .content h3.problem::before  { background: var(--red); }
  .content h3.mechanic::before { background: var(--blue); }
  .content h3.usecase::before  { background: var(--green); }
  .content h3.pitfall::before  { background: var(--accent); }

  .content p { margin-bottom: 10px; color: #ccccd4; }

  .content code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--accent);
  }
  .content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 12px 0;
    overflow-x: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    color: #c8c8d4;
  }
  .content pre .kw  { color: #c792ea; }
  .content pre .fn  { color: #82aaff; }
  .content pre .str { color: #c3e88d; }
  .content pre .cmt { color: #546e7a; font-style: italic; }
  .content pre .num { color: #f78c6c; }

  .content ul { padding-left: 18px; margin-bottom: 10px; }
  .content li { color: #ccccd4; margin-bottom: 4px; }

  .content strong { color: #fff; font-weight: 600; }

  /* Loading state */
  .thinking {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 28px 36px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 4px;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .btn-next {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    padding: 11px 28px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-next:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-ask {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
  }
  .btn-ask:hover { border-color: var(--accent); color: var(--accent); }

  /* Ask question input */
  .ask-box {
    display: none;
    margin-bottom: 16px;
    gap: 8px;
  }
  .ask-box.open { display: flex; }
  .ask-box input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .ask-box input:focus { border-color: var(--accent); }
  .ask-box button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--accent);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    transition: border-color 0.15s;
  }
  .ask-box button:hover { border-color: var(--accent); }

  /* Q&A response */
  .qa-card {
    background: #0f1a0f;
    border: 1px solid #1d3a1d;
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.75;
    color: #b8e8b8;
    animation: fadeUp 0.25s ease;
  }
  .qa-card strong { color: var(--green); }

  /* Syllabus sidebar toggle */
  .syllabus-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 50%;
    width: 48px; height: 48px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(247,201,72,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .syllabus-panel {
    position: fixed;
    right: -320px;
    top: 0; bottom: 0;
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    z-index: 99;
    transition: right 0.3s ease;
  }
  .syllabus-panel.open { right: 0; }
  .syllabus-panel h3 {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .syl-item {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    margin-bottom: 2px;
    cursor: default;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .syl-item.done   { color: var(--green); }
  .syl-item.active { color: var(--accent); background: #1f1a09; }
  .syl-item .syl-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* Done state */
  .done-card {
    text-align: center;
    padding: 60px 40px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 32px;
  }
  .done-card h2 { font-size: 28px; color: var(--accent); margin-bottom: 12px; }
  .done-card p  { color: var(--muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">JS<span>/</span>MASTERY</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="topic-badge" id="topicBadge">Phase 1 — Foundation</div>
</header>

<main>
  <div class="phase-pill" id="phasePill">
    <div class="phase-dot"></div>
    <span id="phaseLabel">ES5 &amp; Core Mechanics</span>
  </div>

  <div id="lessonArea"></div>

  <div class="ask-box" id="askBox">
    <input type="text" id="askInput" placeholder="Ask a follow-up question about this topic..."/>
    <button onclick="submitQuestion()">Ask →</button>
  </div>

  <div class="controls">
    <button class="btn-next" id="btnNext" onclick="nextTopic()">Next Topic →</button>
    <button class="btn-ask" onclick="toggleAsk()">Ask a Question</button>
  </div>
</main>

<button class="syllabus-toggle" onclick="toggleSyllabus()" title="Syllabus">☰</button>

<div class="syllabus-panel" id="syllabusPanel">
  <h3>Syllabus</h3>
  <div id="syllabusList"></div>
</div>

<script>
// ── SYLLABUS ──────────────────────────────────────────────────────────────────
const SYLLABUS = [
  { phase: "Phase 1 — ES5 & Foundation",    topic: "The Birth of JS, var, Hoisting & Scope" },
  { phase: "Phase 1 — ES5 & Foundation",    topic: "Execution Context, Call Stack & Scope Chain" },
  { phase: "Phase 1 — ES5 & Foundation",    topic: "Closures (Memory Management & Module Patterns)" },
  { phase: "Phase 1 — ES5 & Foundation",    topic: "The `this` Keyword (All 4 Bindings)" },
  { phase: "Phase 1 — ES5 & Foundation",    topic: "Prototypal Inheritance vs Classical OOP" },
  { phase: "Phase 1 — ES5 & Foundation",    topic: "Event Loop, Web APIs, Microtasks & Macrotasks" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "let / const & the Temporal Dead Zone" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Arrow Functions — Deep Dive (lexical this)" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Template Literals & Tagged Templates" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Destructuring (Arrays, Objects, Nested)" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Rest & Spread Operators" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Default Function Parameters" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Classes (syntactic sugar, static, private, extends)" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Maps, Sets, WeakMaps, WeakSets" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Promises (chaining, .all, .race, .allSettled)" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "Generators (function*) & Iterators" },
  { phase: "Phase 2 — ES6 (ES2015)",        topic: "ES6 Modules vs CommonJS" },
  { phase: "Phase 3 — ES2016 (ES7)",        topic: "Array.includes() vs indexOf + Exponentiation **" },
  { phase: "Phase 4 — ES2017 (ES8)",        topic: "async / await (wrapping generators & Promises)" },
  { phase: "Phase 4 — ES2017 (ES8)",        topic: "Object.values(), Object.entries(), padStart/padEnd" },
  { phase: "Phase 5 — ES2018 (ES9)",        topic: "Object Rest/Spread, for-await-of, Promise.finally()" },
  { phase: "Phase 6 — ES2019 (ES10)",       topic: "flat(), flatMap(), Object.fromEntries(), optional catch" },
  { phase: "Phase 7 — ES2020 (ES11)",       topic: "Nullish Coalescing ?? and Optional Chaining ?." },
  { phase: "Phase 7 — ES2020 (ES11)",       topic: "BigInt, Promise.allSettled(), globalThis, Dynamic import()" },
  { phase: "Phase 8 — ES2021 (ES12)",       topic: "Logical Assignment &&=, ||=, ??= + replaceAll + Promise.any()" },
  { phase: "Phase 9 — ES2022 (ES13)",       topic: "Top-level await, Class Private Fields #, Array.at(), Object.hasOwn()" },
  { phase: "Phase 10 — ES2023 (ES14)",      topic: "Immutable Arrays: toSorted, toReversed, findLast" },
  { phase: "Phase 11 — ES2024 & Future",    topic: "Promise.withResolvers(), Object.groupBy(), Temporal API" },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentIndex = 0;
let isLoading    = false;
let history      = [];   // chat history for this session

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a Senior JavaScript Architect and Technical Historian. Your job is to teach JavaScript deeply, topic by topic.

For EVERY topic, strictly follow this 4-part framework. Use this EXACT HTML output format — no markdown, only the tags below:

<h2>[Topic Title]</h2>
<span class="feature-name">Feature: [concise feature name]</span>

<h3 class="problem">⚠ The Historical Problem</h3>
<p>Explain what was broken or impossible before this feature. Reference ES5 or earlier. Be vivid.</p>
<pre>[relevant old-way code example]</pre>

<h3 class="mechanic">⚙ The Mechanics</h3>
<p>Explain how the JS engine actually processes this. Reference execution context, environment records, prototype chains, spec behavior where relevant.</p>
<pre>[code showing internal behavior]</pre>

<h3 class="usecase">✓ The Real-World Use Case</h3>
<p>Explain exactly when to reach for this over alternatives. Give a real scenario.</p>
<pre>[practical real-world code]</pre>

<h3 class="pitfall">⚡ The Pitfall</h3>
<p>What is the most common mistake developers make with this? Show the broken code and the fix.</p>
<pre>[broken code then fixed code with comments]</pre>

Rules:
- Use <code> tags inline for short code references
- Use <pre> blocks for multi-line code
- Use <strong> for emphasis
- Never use markdown (no backticks, no ##, no **)
- Be thorough but focused — this is professional-grade teaching
- For Arrow Functions specifically: dedicate extra depth to lexical this, why .call/.apply/.bind cannot override it, and the [[Environment]] reference
- For the first topic (birth of JavaScript), include the Brendan Eich story, the 10-day creation, and Netscape vs Microsoft browser wars context`;

// ── BUILD SYLLABUS UI ─────────────────────────────────────────────────────────
function buildSyllabus() {
  const list = document.getElementById('syllabusList');
  let lastPhase = '';
  SYLLABUS.forEach((item, i) => {
    if (item.phase !== lastPhase) {
      const ph = document.createElement('div');
      ph.style.cssText = 'font-size:10px;font-family:"IBM Plex Mono",monospace;color:#444;text-transform:uppercase;letter-spacing:0.08em;margin:14px 0 6px;';
      ph.textContent = item.phase;
      list.appendChild(ph);
      lastPhase = item.phase;
    }
    const el = document.createElement('div');
    el.className = 'syl-item' + (i === 0 ? ' active' : '');
    el.id = `syl-${i}`;
    el.innerHTML = `<div class="syl-dot"></div>${item.topic}`;
    list.appendChild(el);
  });
}

// ── UPDATE PROGRESS ───────────────────────────────────────────────────────────
function updateProgress(index) {
  const pct = Math.round((index / SYLLABUS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('topicBadge').textContent =
    index < SYLLABUS.length ? `${index + 1} / ${SYLLABUS.length}` : 'Complete!';
  document.getElementById('phaseLabel').textContent =
    index < SYLLABUS.length ? SYLLABUS[index].phase : 'All phases complete';

  // Syllabus highlight
  SYLLABUS.forEach((_, i) => {
    const el = document.getElementById(`syl-${i}`);
    if (!el) return;
    el.className = 'syl-item' + (i < index ? ' done' : i === index ? ' active' : '');
  });
}

// ── RENDER LESSON ─────────────────────────────────────────────────────────────
function renderLesson(html, isQA = false) {
  const area = document.getElementById('lessonArea');
  if (isQA) {
    const card = document.createElement('div');
    card.className = 'qa-card';
    card.innerHTML = html;
    area.appendChild(card);
  } else {
    area.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'lesson-card';
    card.innerHTML = `<div class="content">${html}</div>`;
    area.appendChild(card);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLoading(msg = 'Thinking...') {
  const area = document.getElementById('lessonArea');
  area.innerHTML = `
    <div class="lesson-card thinking">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
      ${msg}
    </div>`;
}

// ── CALL CLAUDE API ───────────────────────────────────────────────────────────
async function callClaude(userMessage) {
  history.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: history,
    })
  });

  const data = await response.json();
  const reply = data.content?.map(b => b.text || '').join('') || 'Error getting response.';
  history.push({ role: 'assistant', content: reply });
  return reply;
}

// ── NEXT TOPIC ────────────────────────────────────────────────────────────────
async function nextTopic() {
  if (isLoading) return;
  if (currentIndex >= SYLLABUS.length) return;

  isLoading = true;
  document.getElementById('btnNext').disabled = true;
  document.getElementById('askBox').classList.remove('open');

  const topic = SYLLABUS[currentIndex];
  showLoading(`Loading: ${topic.topic}...`);
  updateProgress(currentIndex);

  const prompt = currentIndex === 0
    ? `Teach me the first topic: "${topic.topic}". Begin with the chaotic 10-day birth of JavaScript in 1995, the Brendan Eich story, and the Netscape browser wars. Then cover var, hoisting, and function/global scope. Use the 4-part framework strictly.`
    : `Teach me: "${topic.topic}". Use the 4-part framework strictly. Phase context: ${topic.phase}.`;

  try {
    const reply = await callClaude(prompt);
    renderLesson(reply);
    currentIndex++;

    if (currentIndex >= SYLLABUS.length) {
      document.getElementById('lessonArea').innerHTML += `
        <div class="done-card">
          <h2>🎉 Mastery Unlocked</h2>
          <p>You've completed all ${SYLLABUS.length} topics across 11 phases of JavaScript evolution.<br>You're now operating at Senior Architect level.</p>
        </div>`;
      document.getElementById('btnNext').textContent = '✓ Complete';
      document.getElementById('btnNext').disabled = true;
    }
  } catch (e) {
    renderLesson(`<p style="color:var(--red)">Error: ${e.message}</p>`);
  }

  isLoading = false;
  document.getElementById('btnNext').disabled = false;
}

// ── ASK FOLLOW-UP ─────────────────────────────────────────────────────────────
function toggleAsk() {
  const box = document.getElementById('askBox');
  box.classList.toggle('open');
  if (box.classList.contains('open')) {
    document.getElementById('askInput').focus();
  }
}

async function submitQuestion() {
  const input = document.getElementById('askInput');
  const q = input.value.trim();
  if (!q || isLoading) return;

  input.value = '';
  isLoading = true;
  document.getElementById('btnNext').disabled = true;

  const area = document.getElementById('lessonArea');
  const loadEl = document.createElement('div');
  loadEl.className = 'qa-card';
  loadEl.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  area.appendChild(loadEl);

  try {
    const reply = await callClaude(
      `Follow-up question about the current topic: "${q}". Answer clearly using HTML (p, code, pre, strong tags only). Stay within the current topic context.`
    );
    loadEl.remove();
    renderLesson(`<strong>Q: ${q}</strong><br><br>${reply}`, true);
  } catch (e) {
    loadEl.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  }

  isLoading = false;
  document.getElementById('btnNext').disabled = false;
}

// ── SYLLABUS PANEL ────────────────────────────────────────────────────────────
function toggleSyllabus() {
  document.getElementById('syllabusPanel').classList.toggle('open');
}

document.getElementById('askInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitQuestion();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSyllabus();

// Auto-load first topic
document.getElementById('lessonArea').innerHTML = `
  <div class="lesson-card" style="text-align:center;padding:60px 40px;">
    <div style="font-size:48px;margin-bottom:20px;">⚡</div>
    <h2 style="font-size:24px;margin-bottom:10px;">JavaScript Mastery</h2>
    <p style="color:var(--muted);margin-bottom:28px;">28 topics · 11 phases · Senior Architect level<br>Powered by Claude AI — no syntax regurgitation, only deep understanding.</p>
